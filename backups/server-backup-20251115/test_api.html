<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <style>
        .home-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .home-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .home-button .icon {
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .home-button {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
    </style>

    <a href="http://172.24.1.33/" class="home-button">
        <span class="icon">🏠</span>
        <span>Home</span>
    </a>

    <h1>Test API Discovery e ConfigSwitch</h1>
    
    <h2>Test 1: Discovery Health</h2>
    <button onclick="testDiscoveryHealth()">Test Health API</button>
    <pre id="result1"></pre>

    <h2>Test 2: Discovery Scan</h2>
    <input type="text" id="network" value="172.24.1.1" placeholder="IP o rete">
    <button onclick="testDiscovery()">Test Discovery</button>
    <pre id="result2"></pre>

    <h2>Test 3: ConfigSwitch Processes</h2>
    <button onclick="testProcesses()">Test Processes API</button>
    <pre id="result3"></pre>

    <script>
        async function testDiscoveryHealth() {
            const result = document.getElementById('result1');
            result.textContent = 'Caricamento...';
            
            try {
                const response = await fetch('http://172.24.1.33/api/health');
                const data = await response.json();
                result.textContent = 'SUCCESS:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = 'ERROR:\n' + error.message + '\n' + error.stack;
            }
        }

        async function testDiscovery() {
            const result = document.getElementById('result2');
            const network = document.getElementById('network').value;
            result.textContent = 'Caricamento...';
            
            try {
                const response = await fetch('http://172.24.1.33/api/discover', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ network: network })
                });
                
                const data = await response.json();
                result.textContent = 'SUCCESS:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = 'ERROR:\n' + error.message + '\n' + error.stack;
            }
        }

        async function testProcesses() {
            const result = document.getElementById('result3');
            result.textContent = 'Caricamento...';
            
            try {
                const response = await fetch('http://172.24.1.33/api/processes');
                const data = await response.json();
                result.textContent = 'SUCCESS:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = 'ERROR:\n' + error.message + '\n' + error.stack;
            }
        }
    </script>
</body>
</html>
