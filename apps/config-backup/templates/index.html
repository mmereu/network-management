<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Backup - Network Management</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
                <h1>Config Backup</h1>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn-icon" title="Cambia tema">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <a href="/" class="btn-icon" title="Dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Backup Form Card -->
        <section class="card backup-form-card">
            <h2 class="card-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
                Nuovo Backup
            </h2>

            <form id="backup-form" class="backup-form">
                <!-- Site Selection -->
                <div class="form-group">
                    <label for="site-select">Seleziona Sito</label>
                    <select id="site-select" class="form-control">
                        <option value="">-- Caricamento siti... --</option>
                    </select>
                </div>

                <!-- Manual IP Input -->
                <div class="form-group">
                    <label for="ip-input">Oppure inserisci IP manualmente</label>
                    <input type="text" id="ip-input" class="form-control" placeholder="es. 10.1.4.251">
                </div>

                <!-- Credentials (auto-filled from CSV or manual) -->
                <div class="credentials-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" class="form-control" placeholder="admin">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="********">
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="form-actions">
                    <button type="submit" id="btn-backup" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Esegui Backup
                    </button>
                </div>
            </form>

            <!-- Status Message -->
            <div id="status-message" class="status-message hidden"></div>
        </section>

        <!-- Results Section -->
        <section id="results-section" class="card results-card hidden">
            <h2 class="card-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 11 12 14 22 4"/>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                </svg>
                Risultato Backup
            </h2>

            <div id="backup-result" class="backup-result">
                <!-- Filled by JS -->
            </div>
        </section>

        <!-- Diff Viewer Section -->
        <section id="diff-section" class="card diff-card hidden">
            <div class="diff-header">
                <h2 class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    Differenze Configurazione
                </h2>
                <div class="diff-controls">
                    <label class="toggle-label">
                        <input type="checkbox" id="show-only-diff" checked>
                        <span>Solo differenze</span>
                    </label>
                </div>
            </div>

            <div class="diff-stats" id="diff-stats">
                <!-- Filled by JS -->
            </div>

            <div class="diff-viewer" id="diff-viewer">
                <!-- Filled by JS -->
            </div>
        </section>

        <!-- History Section -->
        <section class="card history-card">
            <div class="history-header">
                <h2 class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                    Storico Backup
                </h2>
                <div class="history-filter">
                    <select id="history-filter-site" class="form-control form-control-sm">
                        <option value="">Tutti i siti</option>
                    </select>
                    <button id="btn-refresh-history" class="btn btn-secondary btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                        Aggiorna
                    </button>
                </div>
            </div>

            <div class="history-table-container">
                <table class="history-table" id="history-table">
                    <thead>
                        <tr>
                            <th>Sito</th>
                            <th>IP</th>
                            <th>Data/Ora</th>
                            <th>Metodo</th>
                            <th>Dimensione</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr><td colspan="6" class="loading">Caricamento...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p id="loading-text">Connessione in corso...</p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
